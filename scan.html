function GHOST_SCAN_REAL(r){
    if(r.MISS === true){
        return {
            ...r,
            ERROR: true,
            RESULT: "MISS",
            WAHRHEIT: false
        };
    }

    const result = (r.STATUS === "REAL") ? r.IST : r.NEU;

    return {
        ...r,
        RESULT: result,
        WAHRHEIT: (result === r.IST),
        ERROR: false
    };
}
